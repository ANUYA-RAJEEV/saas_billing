{% extends 'billing_portal/base.html' %}
{% block title %}Delete Company{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4 text-center border-danger">
            <h3 class="text-danger mb-4">Delete Company</h3>
            <p>Are you sure you want to completely delete <strong>{{ company.company_name }}</strong> and its user account?</p>
            <p class="text-muted"><small>This action cannot be undone.</small></p>
            <form method="post" class="mt-4">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">Yes, Delete permanently</button>
                <a href="{% url 'admin_dashboard' %}" class="btn btn-outline-secondary ms-2">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
